name: firmware

# Guards the unified robot+hub image from a CLEAN clone: all three board images
# build (exercising the seam a local checkout papers over — the gitignored
# wifi_creds.h), the provisioning-util unit tests pass on the native env, and
# cppcheck stays clean at medium+ severity.
# robot-l298n is not in the matrix: it extends esp32dev with only an
# upload_port change — same binary.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: python3 -m pip install --quiet platformio

      - name: Unit tests (native env, system gcc)
        run: pio test -e native

  # The vendored dashboard's freshness gate, finally wired to something.
  # hub/dashboard.html is canonical; this repo embeds a byte-identical copy so
  # the hub role can serve the UI offline (src/CMakeLists.txt), and byte-identical
  # is what makes drift a plain `cmp` instead of a semantic diff.
  #
  # sync-dashboard.sh has called itself the "CI / pre-flash freshness gate" since
  # the day it was written and had never once run in CI — it resolves ../../hub,
  # a sibling checkout on a maintainer's laptop, which does not exist in a clone,
  # so it could only ever have exited 2. The actual gate was a human remembering:
  # four "Resync the vendored dashboard" commits in the last fifteen is what that
  # looks like from the outside. It works until it doesn't, and the failure is an
  # ESP hub serving a months-old dashboard against a current contract, green.
  #
  # hub is public, so this needs no token. It checks hub@main on purpose: a
  # dashboard change landed there SHOULD red this repo until someone resyncs —
  # that is the tradeoff the vendoring seam accepts, made visible instead of
  # remembered.
  dashboard-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: sprocket-robotics/hub
          path: .hub
      - name: The vendored dashboard is byte-identical to hub's canonical copy
        run: HUB_REPO="$PWD/.hub" tools/sync-dashboard.sh --check
      # Same seam again for the IDE loader shell: canonical in
      # sprocket-robotics/ide (beside the app whose CORS/markup contract it
      # leans on), vendored here as web/ide_shell.html, served at /ide/.
      - uses: actions/checkout@v4
        with:
          repository: sprocket-robotics/ide
          path: .ide
      - name: The vendored IDE shell is byte-identical to ide's canonical copy
        run: IDE_REPO="$PWD/.ide" tools/sync-ide-shell.sh --check
      # Same seam, the other shared surface: the captive probe handlers must
      # register exactly the probe paths in hub's CONTRACT.md § Captive
      # onboarding and serve each genuine-success body byte-for-byte. Catches a
      # dead (unregistered) handler and probe-table drift — both invisible to
      # code review, both shipped once on 2026-07-19.
      - name: The captive probe handlers match CONTRACT.md § Captive onboarding
        run: HUB_REPO="$PWD/.hub" python3 tools/check-captive-probes.py

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [esp32dev, esp32cam, esp32c3-supermini, esp32s3cam]
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages (espressif32 platform + xtensa/riscv toolchains)
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: python3 -m pip install --quiet platformio

      - name: Stand in for the gitignored venue Wi-Fi credentials
        run: cp src/wifi_creds.example.h src/wifi_creds.h

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      # Upload BEFORE `pio check`: with no cached idedata (every CI run) check
      # re-runs the IDF configure into the same .pio/build/<env>/ and the just-built
      # images don't survive it (run 29349751780). continue-on-error because the
      # artifact is a convenience — org storage quota exhaustion must not redden
      # the build guard.
      - name: Upload flashable image
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: firmware-${{ matrix.env }}
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/bootloader.bin
            .pio/build/${{ matrix.env }}/partitions.bin
          if-no-files-found: error
          retention-days: 7

      - name: Static analysis (esp32dev = the union build; config in platformio.ini)
        if: matrix.env == 'esp32dev'
        run: pio check -e esp32dev --fail-on-defect=medium --fail-on-defect=high

  # The flasher at sprocket-robotics.github.io serves these bytes to students. It
  # used to serve whatever a maintainer's laptop compiled, and a local checkout
  # has gitignored build inputs (src/wifi_creds.h among them) that a clean clone
  # does not — so what ended up inside a public image depended on the machine,
  # while the manifest could only ever name the commit. Provenance that stops at
  # the commit is not provenance over the bytes.
  #
  # Publishing from here closes that: this job sees only the example credentials,
  # which makes the image a function of the commit alone. Release assets send no
  # CORS headers, ruling them out for the browser but irrelevant to the runner
  # that deploys the site — the same channel the Pi image ships on (hub's
  # build-image.yml).
  publish:
    needs: [build, native-tests, dashboard-drift]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Never two publishes at once. This job DELETES firmware-latest and recreates
    # it, so two pushes landing together interleave: both delete (the `|| true`
    # below swallows the second miss), then whichever creates LAST wins — which
    # may be the OLDER commit, leaving the rolling tag permanently behind main
    # with both runs green. cancel-in-progress is false deliberately: a publish
    # interrupted between the delete and the create leaves no release at all.
    # (deploy.yml has guarded its Pages deploys this way since it was written;
    # the publisher that feeds it had no equivalent.)
    concurrency:
      group: firmware-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Collect the built images
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: firmware-*

      # A positive control, not an absence check. The real password must never
      # appear in this file, so grepping for it is not an option — instead prove
      # the images came from the example header by requiring its placeholder to
      # be present. A build carrying real credentials would not contain it.
      # (Absence checks are how this went unnoticed: a scan that silently reads
      # nothing reports clean.)
      - name: Refuse to publish an image not built from the example credentials
        run: |
          set -u
          shopt -s nullglob
          images=(dist/firmware-*/firmware.bin)
          if [ ${#images[@]} -ne 4 ]; then
            echo "::error::expected 4 images, found ${#images[@]} — build artifacts missing"
            exit 1
          fi
          fail=0
          for f in "${images[@]}"; do
            if LC_ALL=C grep -qa 'your-venue-wifi' "$f"; then
              echo "ok: $f built from wifi_creds.example.h"
            else
              echo "::error::$f lacks the placeholder SSID — built from real credentials, refusing to publish"
              fail=1
            fi
          done
          exit $fail

      - name: Lay the images out the way the flasher addresses them
        run: |
          set -eu
          mkdir -p out
          emit() {  # <pio env> <board dir the page uses>
            for part in bootloader partitions firmware; do
              cp "dist/firmware-$1/$part.bin" "out/$2-$part.bin"
            done
          }
          emit esp32dev          robot-esp32dev
          emit esp32cam          robot-esp32cam
          emit esp32c3-supermini robot-esp32c3
          emit esp32s3cam        robot-esp32s3cam
          # `release` travels in the manifest so the page links the artifact it
          # flashed without hardcoding this repo's tag naming — the manifest is
          # the contract between the two, and a tag rename should not need an
          # edit on the site.
          cat > out/manifest.json <<EOF
          {
            "source": "sprocket-robotics/robot",
            "commit": "$(git rev-parse --short HEAD)",
            "release": "firmware-latest",
            "refreshed": "$(date -u +%F)",
            "built_by": "robot firmware.yml run ${GITHUB_RUN_ID}",
            "images": ["robot-esp32dev", "robot-esp32cam", "robot-esp32c3", "robot-esp32s3cam"]
          }
          EOF
          ls -l out

      # A rolling tag, not a version: the flasher always wants main's images, and
      # a release per commit would be twenty releases on a busy day.
      - name: Publish as the rolling firmware-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release delete firmware-latest --yes --cleanup-tag || true
          gh release create firmware-latest out/* \
            --target "$GITHUB_SHA" \
            --title "Firmware from main" \
            --notes "Images built from ${GITHUB_SHA} by run ${GITHUB_RUN_ID}. The flasher at sprocket-robotics.github.io deploys from this release."

      # The release is a downloadable-artifact channel (grab a .bin and flash by
      # hand, the way sdflash streams a Pi image) and the provenance the flasher's
      # stamp links to. It no longer FEEDS the flasher: the `pages` job below
      # serves the images straight from this run's build, so the served site can't
      # lag the release. The cross-repo poll that once could — and did, 15-commit
      # stale and green, 2026-07-17 — is gone with the repo boundary it crossed.

  # Serve the flasher at sprocket-robotics.github.io/robot/ from the SAME run that
  # built the images. web/site/ is the whole static site (the flash landing page +
  # the esptool module); this run's images are laid out beside it the way flash.js
  # addresses them, so the page and the bytes it writes are always one commit.
  # This is what moving the flasher into robot buys — no rolling-tag poll, no
  # cross-repo fetch, no release round-trip; the apex is now a thin landing page
  # that links here.
  pages:
    needs: [build, native-tests, dashboard-drift]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    # Pages allows one deploy at a time; never interrupt one mid-flight.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Collect the built images
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: firmware-*

      - name: Assemble the site — flasher + this run's images
        run: |
          set -eu
          shopt -s nullglob
          images=(dist/firmware-*/firmware.bin)
          if [ ${#images[@]} -ne 4 ]; then
            echo "::error::expected 4 built images, found ${#images[@]} — refusing to deploy a flasher missing a board"
            exit 1
          fi
          mkdir -p _site
          cp -R web/site/. _site/
          emit() {  # <pio env> <board dir the page addresses>
            mkdir -p "_site/flash/bin/$2"
            for part in bootloader partitions firmware; do
              cp "dist/firmware-$1/$part.bin" "_site/flash/bin/$2/$part.bin"
            done
          }
          emit esp32dev          robot-esp32dev
          emit esp32cam          robot-esp32cam
          emit esp32c3-supermini robot-esp32c3
          emit esp32s3cam        robot-esp32s3cam
          # The manifest is the flasher's provenance source (flash.js): it stamps
          # the commit and links `release` — the rolling tag the publish job cuts
          # from this same commit — as the place these exact bytes can be
          # downloaded and diffed against a board dump.
          cat > _site/flash/bin/manifest.json <<EOF
          {
            "source": "sprocket-robotics/robot",
            "commit": "$(git rev-parse --short HEAD)",
            "release": "firmware-latest",
            "refreshed": "$(date -u +%F)",
            "built_by": "robot firmware.yml run ${GITHUB_RUN_ID}",
            "images": ["robot-esp32dev", "robot-esp32cam", "robot-esp32c3", "robot-esp32s3cam"]
          }
          EOF
          find _site -name '.DS_Store' -delete
          echo "site contents:"; find _site -maxdepth 3 -type f | sort

      # The positive control the publish job runs over the release, re-run on the
      # bytes about to be SERVED — the guard belongs at every boundary the bytes
      # cross. A build carrying real credentials would not contain the example
      # placeholder; refuse to deploy it. (Absence checks read clean on a silent
      # miss, which is how this class of bug hides — prove the placeholder present.)
      - name: Refuse to serve an image not built from the example credentials
        run: |
          set -u
          fail=0
          for f in _site/flash/bin/*/firmware.bin; do
            if LC_ALL=C grep -qa 'your-venue-wifi' "$f"; then
              echo "ok: $f"
            else
              echo "::error::$f lacks the placeholder SSID — refusing to deploy"
              fail=1
            fi
          done
          exit $fail

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
