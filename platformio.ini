; robot — ESP32 zenoh-pico clients for the classroom hub (one env per board).
; Builds are plain PlatformIO+espidf. Flash here; observe serial via
; `esp32loop watch esp32_devkit`. ROBOT_NAME defaults to the unassigned-pool
; name — the real name is assigned post-join from the hub dashboard
; (robots/<id>/cmd/config), not here.

; Shared base for the three ESP-IDF board envs (native/tests do NOT extend it, so
; they never pull in zenoh). Single-sources the toolchain pin, the zenoh-pico dep
; and its build-time clock patch, the partition table, and the web-embed hook — a
; bump is one edit here, not three. Board envs below add board/pins/ports and
; board-specific build_flags via `extends`.
[espidf_base]
platform = espressif32@6.13.0            ; ships IDF 5.5.3; pin held for reproducible builds
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder ; panic backtraces decode to source lines in `pio device monitor`
lib_deps = https://github.com/eclipse-zenoh/zenoh-pico.git#9fb469aa072007e7f9b410e25d06057518892c30
    ; ^ post-1.9.0 main (2026-07-21). 1.9.0 — the latest RELEASE — ships an executor
    ; bug: a fut slot read lands on the executor's own uint8 index arrays and the
    ; bytes get called as _fut_fn (deterministic InstrFetchProhibited at
    ; PC=0x100f0e0d, 6/6 repros on the S3 hub role; the wedge-class IWDT crashes
    ; were the write side of the same defect). main's executor rework (#1244/#1241/
    ; #1245) fixes it — soak-verified on the bench 2026-07-21. This SHA also carries
    ; the #1270 condvar clock fix upstream, so patch_zenoh.py no-ops here (it still
    ; patches a 1.9.0 checkout). Bump deliberately; drop -Wno-error=maybe-uninitialized
    ; from the envs when upstream initializes sleeping_idx in _z_executor_get_next_fut.
board_build.partitions = partitions.csv   ; A/B — ota_0 + ota_1, no factory. See that file's header for the sizing
                                          ; measurement and the 64 KB alignment bound; this line is a pointer, not a copy.
extra_scripts =
    pre:tools/embed_web.py    ; generates src/dashboard_html.c + src/ide_shell_html.c (hub role's embedded pages) from web/
    pre:tools/patch_zenoh.py  ; reapplies the zenoh-pico ESP-IDF timed-wait clock fix onto the fetched dep (see that file)

[env:esp32dev]
extends = espidf_base
board = az-delivery-devkit-v4            ; = classic ESP32-D0WD/WROOM (our chip)
upload_port = /dev/cu.usbserial-0001      ; the devkit's onboard CP2102. Port map re-verified on the wire 2026-07-12
                                          ; (boards misflashed both ways trusting the old comment): CP2102 = devkit,
                                          ; FT232R A5069RR4 = the CAM's external adapter.
upload_speed = 921600
build_flags = -DHW_BOARD='"esp32-devkit"' -DROBOT_NAME='"unassigned"'
    -DZENOH_ESPIDF -DZ_FEATURE_UNICAST_PEER=1   ; MQTT->Zenoh cutover: esp-idf system layer + hub peer-listen
    -Wno-error=maybe-uninitialized       ; rides the zenoh-pico SHA pin (see esp32s3cam env)
; `pio check` config — CI runs it on this env only (the union build; camera.c is
; the one cam-only source). unusedFunction is a per-file false positive: cppcheck
; can't see cross-file callers or IDF-registered callbacks (app_main, handlers).
;
; The other two suppressions guard against the VENDORED zenoh-pico, not our code
; — `check_skip_packages` excludes package .c files but cppcheck still reports
; defects in package HEADERS reached by #include from our src. A cppcheck bump on
; the runner (identical code, 0→11 HIGH between two green/red runs one day apart,
; 2026-07-21) started flagging zenoh-pico's own macros: `uninitvar` in its
; template headers, and an `internalAstError` where it can't parse a
; `z_declare_subscriber(z_loan(...), z_move(...))` expansion in our src. Both are
; the analyzer failing on third-party macros, never a robot defect. Suppress all
; findings under any zenoh-pico path (we don't own or fix the vendored dep — the
; same intent as check_skip_packages), and drop `internalAstError` outright: it
; means cppcheck couldn't build an AST, never that a bug exists, and a genuine
; syntax error in our own code fails the compile step before check ever runs, so
; nothing real hides behind it. Real analysis of our logic stays intact.
check_tool = cppcheck
check_skip_packages = yes
check_flags = cppcheck: --suppress=unusedFunction --suppress=*:*zenoh-pico* --suppress=internalAstError

[env:native]
platform = native
test_framework = unity
build_flags = -DUNIT_TEST -std=c11
test_build_src = yes
build_src_filter = +<provisioning_util.c>

[env:esp32cam]
extends = espidf_base
board = esp32cam                         ; AI-Thinker ESP32-CAM (classic ESP32 + OV2640, no native USB)
upload_port = /dev/cu.usbserial-A5069RR4 ; the CAM's plug-in FT232R adapter on TX/RX (serial-numbered, stable) — the CAM
                                         ; has no USB socket of its own. Verified 2026-07-12: this is the FT232R, NOT the
                                         ; CP2102 (that one is the devkit's onboard bridge).
upload_speed = 115200                    ; CAM browns out at high baud over the external adapter ("chip stopped responding") — flash slow
build_flags = -DHW_BOARD='"esp32cam"' -DROBOT_NAME='"unassigned"'
    -DLED_GPIO=GPIO_NUM_33 -DLED_ACTIVE_LOW=1            ; rear red LED (GPIO4 is the blinding flash)
    -DHAS_CAMERA=1                                       ; the only board with an OV2640 → camera.c compiles the stream
    -DCAM_XCLK_ON_BUTTON=1                               ; this board's XCLK IS GPIO0/BOOT — disable the recover button (robot_role.c)
    -DZENOH_ESPIDF -DZ_FEATURE_UNICAST_PEER=1            ; MQTT->Zenoh cutover
    -Wno-error=maybe-uninitialized       ; rides the zenoh-pico SHA pin (see esp32s3cam env)

; ESP32-S3-CAM — Freenove ESP32-S3-WROOM N8R8 (8 MB flash + 8 MB OCTAL PSRAM) + OV2640.
; Dual-core Xtensa LX7, so the C3's single-core executor-starvation hazard doesn't
; apply here. Programmed over a CH343 USB->UART bridge on UART0 (not the S3's own
; native USB), so it flashes like the classic boards. Octal-PSRAM + 8 MB flash live
; in sdkconfig.defaults.esp32s3 (IDF loads it after sdkconfig.defaults, per target).
[env:esp32s3cam]
extends = espidf_base
board = freenove_esp32_s3_wroom          ; N8R8: qio flash + opi (octal) psram, 240 MHz
upload_port = /dev/cu.usbmodem5B414834361 ; the board's CH343 bridge (serial-numbered, stable)
upload_speed = 921600
build_flags = -DHW_BOARD='"esp32s3cam"' -DROBOT_NAME='"unassigned"'
    -DHAS_CAMERA=1 -DCAM_PINS_FREENOVE_S3=1              ; OV2640 on this board's S3 pin map (camera.c)
    ; Rides the zenoh-pico SHA pin: its _z_executor_get_next_fut trips gcc's
    ; maybe-uninitialized false positive (out-param filled by pqueue_pop after a
    ; non-NULL peek) under the lib's -Werror. Drop when upstream initializes it.
    -Wno-error=maybe-uninitialized
    -DLED_WS2812_GPIO=48                                 ; onboard addressable RGB — no plain-GPIO LED on this board
    -DZENOH_ESPIDF -DZ_FEATURE_UNICAST_PEER=1            ; MQTT->Zenoh cutover

[env:esp32c3-supermini]
extends = espidf_base
board = esp32-c3-devkitm-1               ; ESP32-C3 SuperMini (QFN32, 4 MB, native USB)
upload_port = /dev/cu.usbmodem1201       ; native USB-Serial/JTAG — RENUMBERS on chip reset; ls /dev/cu.usbmodem* and pass --upload-port when this is stale
build_flags = -DBUTTON_GPIO=GPIO_NUM_9   ; SuperMini BOOT button = GPIO9
    -DHW_BOARD='"esp32c3-supermini"' -DROBOT_NAME='"unassigned"'
    -DLED_GPIO=GPIO_NUM_8 -DLED_ACTIVE_LOW=1             ; onboard blue LED, sinks into GPIO8
    ; C3 has GPIO 0-21 only — the classic-ESP32 motor defaults (25/26/27) are
    ; invalid here (GPIO_PIN mask error). Kit-standard 6-wire map, matching the
    ; L298N silkscreen 1:1 (firmware IN1 = the pin wired to the terminal marked
    ; IN1): avoids strapping (2/8/9), USB (18/19), console (20/21), LED (8),
    ; BOOT (9). The map only holds under the kit's wiring convention — LEFT
    ; wheel (robot's left, standing behind it) plugs into OUT1/OUT2, channel A.
    ; A robot with the motors plugged the other way mirrors every turn; verify
    ; with a one-wheel pwm test ({"left_motor":150,"right_motor":0}), fix the
    ; plugs, don't remap. Reassignable post-join from the dashboard for a
    ; student-wired chassis.
    -DMOTOR_ENA=6 -DMOTOR_IN1=0 -DMOTOR_IN2=1 -DMOTOR_ENB=5 -DMOTOR_IN3=3 -DMOTOR_IN4=4
    -DZENOH_ESPIDF -DZ_FEATURE_UNICAST_PEER=1   ; MQTT->Zenoh cutover
    -Wno-error=maybe-uninitialized       ; rides the zenoh-pico SHA pin (see esp32s3cam env)

; The L298N motor robot — classic ESP32 + 6-wire H-bridge. Same chip as esp32dev;
; motor pins default to ENA/IN D25/26/27 left, D14/12/13 right (encoders D32/34)
; and are reassignable post-join from the dashboard for a student-wired chassis.
[env:robot-l298n]
extends = env:esp32dev
upload_port = /dev/cu.usbserial-8
