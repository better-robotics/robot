; robot — ESP32 zenoh-pico clients for the classroom fabric (one env per board).
; PlatformIO is zenoh-pico's official ESP-IDF path (its library.json + extra_script
; assemble + compile the lib). Flash here; observe serial via `esp32loop watch esp32_devkit`.
[env:esp32dev]
platform = espressif32@6.13.0            ; pin <7.x — 7.0 jumps to IDF 6 and breaks zenoh-pico's PIO build
board = az-delivery-devkit-v4            ; = classic ESP32-D0WD/WROOM (our chip)
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbserial-A5069RR4  ; the devkit's own FTDI (serial-numbered, stable) — NOT usbserial-0001, that's the CAM's adapter
upload_speed = 921600
lib_deps = https://github.com/eclipse-zenoh/zenoh-pico   ; pulls 1.9.0 via library.json
build_flags = -DZENOH_ESPIDF -DHW_BOARD='"esp32-devkit"'
board_build.partitions = partitions.csv   ; 3 MB app — needed for BLE+WiFi+zenoh-pico combined

[env:native]
platform = native
test_framework = unity
build_flags = -DUNIT_TEST -std=c11
test_build_src = yes
build_src_filter = +<improv.c> +<provisioning_util.c>

[env:esp32cam]
platform = espressif32@6.13.0            ; same pin as esp32dev
board = esp32cam                         ; AI-Thinker ESP32-CAM (classic ESP32 + OV2640, no native USB)
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbserial-0001     ; plug-in USB↔UART adapter on TX/RX — the CAM has no USB socket of its own
lib_deps = https://github.com/eclipse-zenoh/zenoh-pico
build_flags = -DZENOH_ESPIDF -DHW_BOARD='"esp32cam"'
    -DLED_GPIO=GPIO_NUM_33 -DLED_ACTIVE_LOW=1            ; rear red LED (GPIO4 is the blinding flash)
board_build.partitions = partitions.csv

[env:esp32c3-supermini]
platform = espressif32@6.13.0            ; same pin as esp32dev
board = esp32-c3-devkitm-1               ; ESP32-C3 SuperMini (QFN32, 4 MB, native USB)
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbmodem1201       ; native USB-Serial/JTAG — RENUMBERS on chip reset; ls /dev/cu.usbmodem* and pass --upload-port when this is stale
lib_deps = https://github.com/eclipse-zenoh/zenoh-pico
build_flags = -DZENOH_ESPIDF -DBUTTON_GPIO=GPIO_NUM_9   ; SuperMini BOOT button = GPIO9
    -DHW_BOARD='"esp32c3-supermini"'
    -DLED_GPIO=GPIO_NUM_8 -DLED_ACTIVE_LOW=1             ; onboard blue LED, sinks into GPIO8
board_build.partitions = partitions.csv
