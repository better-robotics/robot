; robot — ESP32 esp-mqtt clients for the classroom hub (one env per board).
; esp-mqtt ships in-tree with ESP-IDF (no external lib), so builds are plain
; PlatformIO+espidf. Flash here; observe serial via `esp32loop watch esp32_devkit`.
; MQTT_USER/MQTT_PASS default to the demo team1 credential — override per board
; to flash different teams (real per-team creds arrive via provisioning, hub#1).
[env:esp32dev]
platform = espressif32@6.13.0            ; IDF 5.1; pin held for reproducible builds
board = az-delivery-devkit-v4            ; = classic ESP32-D0WD/WROOM (our chip)
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbserial-A5069RR4  ; the devkit's own FTDI (serial-numbered, stable) — NOT usbserial-0001, that's the CAM's adapter
upload_speed = 921600
build_flags = -DHW_BOARD='"esp32-devkit"' -DMQTT_USER='"team1"' -DMQTT_PASS='"change-me-team1"'
board_build.partitions = partitions.csv   ; roomy app table — BLE + Wi-Fi + esp-mqtt

[env:native]
platform = native
test_framework = unity
build_flags = -DUNIT_TEST -std=c11
test_build_src = yes
build_src_filter = +<improv.c> +<provisioning_util.c>

[env:esp32cam]
platform = espressif32@6.13.0            ; same pin as esp32dev
board = esp32cam                         ; AI-Thinker ESP32-CAM (classic ESP32 + OV2640, no native USB)
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbserial-0001     ; plug-in USB↔UART adapter on TX/RX — the CAM has no USB socket of its own
build_flags = -DHW_BOARD='"esp32cam"' -DMQTT_USER='"team1"' -DMQTT_PASS='"change-me-team1"'
    -DLED_GPIO=GPIO_NUM_33 -DLED_ACTIVE_LOW=1            ; rear red LED (GPIO4 is the blinding flash)
board_build.partitions = partitions.csv

[env:esp32c3-supermini]
platform = espressif32@6.13.0            ; same pin as esp32dev
board = esp32-c3-devkitm-1               ; ESP32-C3 SuperMini (QFN32, 4 MB, native USB)
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbmodem1201       ; native USB-Serial/JTAG — RENUMBERS on chip reset; ls /dev/cu.usbmodem* and pass --upload-port when this is stale
build_flags = -DBUTTON_GPIO=GPIO_NUM_9   ; SuperMini BOOT button = GPIO9
    -DHW_BOARD='"esp32c3-supermini"' -DMQTT_USER='"team1"' -DMQTT_PASS='"change-me-team1"'
    -DLED_GPIO=GPIO_NUM_8 -DLED_ACTIVE_LOW=1             ; onboard blue LED, sinks into GPIO8
board_build.partitions = partitions.csv
